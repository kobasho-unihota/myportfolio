<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SoraGrid">
  <title>SoraGrid</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      .pt-safe { padding-top: env(safe-area-inset-top); }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pl-safe { padding-left: env(safe-area-inset-left); }
      .pr-safe { padding-right: env(safe-area-inset-right); }
    }
    
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .modal-enter { transform: translateY(100%); }
    .modal-enter-active { transform: translateY(0); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .modal-exit { transform: translateY(0); }
    .modal-exit-active { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>

  <script>
    // PWAアイコン
    const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="#38bdf8"/><path d="M128,40A88,88,0,1,0,216,128,88.1,88.1,0,0,0,128,40Zm0,160a72,72,0,1,1,72-72A72.08,72.08,0,0,1,128,200Z" fill="#ffffff"/><circle cx="128" cy="128" r="48" fill="#facc15"/></svg>`;
    const iconBase64 = 'data:image/svg+xml;base64,' + btoa(iconSvg);

    const manifest = {
      "name": "SoraGrid",
      "short_name": "SoraGrid",
      "start_url": ".",
      "display": "standalone",
      "background_color": "#f8fafc",
      "theme_color": "#ffffff",
      "icons": [{ "src": iconBase64, "sizes": "192x192 512x512", "type": "image/svg+xml" }]
    };

    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(manifestLink);

    const appleIcon = document.createElement('link');
    appleIcon.rel = 'apple-touch-icon';
    appleIcon.href = iconBase64;
    document.head.appendChild(appleIcon);

    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => self.clients.claim());
      self.addEventListener('fetch', e => {});
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- ヘッダー -->
  <header class="fixed top-0 left-0 right-0 z-20 bg-white/90 backdrop-blur-md border-b border-slate-200 pt-safe shadow-sm">
    <div class="flex items-center justify-between px-4 h-14">
      <button id="editBtn" class="text-blue-500 font-medium px-2 py-1 active:opacity-50 transition-opacity">編集</button>
      <h1 class="text-lg font-bold">SoraGrid</h1>
      <div class="flex items-center gap-1">
        <button id="refreshBtn" class="p-2 text-slate-600 active:opacity-50 transition-opacity rounded-full">
          <i class="ph ph-arrows-clockwise text-xl"></i>
        </button>
        <button id="addBtn" class="p-2 text-blue-500 active:opacity-50 transition-opacity rounded-full">
          <i class="ph ph-plus text-2xl font-bold"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-1 overflow-y-auto mt-14 pb-safe px-3 sm:px-4 py-4 hide-scrollbar">
    <div id="loadingIndicator" class="flex flex-col items-center justify-center py-20 text-slate-400 hidden">
      <i class="ph ph-spinner-gap animate-spin text-4xl mb-2"></i>
      <p class="text-sm">天気データを取得中...</p>
    </div>
    
    <!-- 左右比較マトリックスコンテナ -->
    <div id="matrixContainer" class="w-full">
      <!-- テーブルはJSで動的に生成 -->
    </div>

    <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-slate-500 text-center">
      <i class="ph ph-map-pin text-5xl mb-3 text-slate-300"></i>
      <p class="mb-1 font-bold">地点がありません</p>
      <p class="text-sm text-slate-400 mt-2">右上の「+」ボタンから<br>見たい市区町村を追加してください</p>
    </div>
  </main>

  <!-- オーバーレイ -->
  <div id="modalOverlay" class="fixed inset-0 bg-black/40 z-30 hidden opacity-0 transition-opacity duration-300"></div>

  <!-- 地点検索モーダル -->
  <div id="addModal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-2xl z-40 h-[85vh] flex flex-col modal-enter pb-safe shadow-2xl" style="display: none;">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
      <h2 class="text-lg font-bold">地点を検索</h2>
      <button id="closeModalBtn" class="p-2 bg-slate-100 rounded-full text-slate-600 active:bg-slate-200">
        <i class="ph ph-x text-lg"></i>
      </button>
    </div>
    
    <div class="p-4 border-b border-slate-100 bg-slate-50">
      <form id="searchForm" class="flex gap-2">
        <div class="relative flex-1">
          <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
          <input type="text" id="searchInput" placeholder="例: 新宿区、横浜市" class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-base" autocomplete="off">
        </div>
        <button type="submit" class="bg-blue-500 text-white px-5 rounded-xl font-bold active:bg-blue-600 transition-colors shadow-sm">検索</button>
      </form>
    </div>

    <div class="flex-1 overflow-y-auto hide-scrollbar p-2">
      <div id="searchLoading" class="hidden text-center py-8 text-slate-400">
        <i class="ph ph-spinner-gap animate-spin text-3xl mb-2"></i>
        <p class="text-sm">検索中...</p>
      </div>
      <ul id="searchResultsList" class="divide-y divide-slate-100">
        <div class="text-center py-12 text-slate-400">
          <i class="ph ph-buildings text-4xl mb-2 opacity-50"></i>
          <p class="text-sm">市区町村名を入力して検索してください</p>
        </div>
      </ul>
    </div>
  </div>

  <script>
    // --- ユーティリティ ---
    function getWeatherInfo(code) {
      if (code === 0 || code === 1) return { icon: 'ph-sun', color: 'text-orange-500', name: '晴れ' };
      if (code === 2) return { icon: 'ph-cloud-sun', color: 'text-yellow-500', name: '晴れ時々曇り' };
      if (code === 3) return { icon: 'ph-cloud', color: 'text-slate-400', name: '曇り' };
      if ([45, 48].includes(code)) return { icon: 'ph-cloud-fog', color: 'text-slate-400', name: '霧' };
      if ([51, 53, 55, 56, 57].includes(code)) return { icon: 'ph-cloud-rain', color: 'text-blue-400', name: '霧雨' };
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return { icon: 'ph-cloud-rain', color: 'text-blue-500', name: '雨' };
      if ([71, 73, 75, 77, 85, 86].includes(code)) return { icon: 'ph-snowflake', color: 'text-cyan-500', name: '雪' };
      if ([95, 96, 99].includes(code)) return { icon: 'ph-cloud-lightning', color: 'text-purple-500', name: '雷雨' };
      return { icon: 'ph-sun', color: 'text-slate-300', name: '不明' };
    }

    // 傘の必要性を判定するロジック
    function getUmbrellaStatus(code, pop) {
      const rainSnowCodes = [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 71, 73, 75, 77, 80, 81, 82, 85, 86, 95, 96, 99];
      if (rainSnowCodes.includes(code) || pop >= 50) {
        return { icon: 'ph-umbrella', color: 'text-blue-600', label: '傘必須', bg: 'bg-blue-100/90' };
      } else if (pop >= 30) {
        return { icon: 'ph-umbrella', color: 'text-indigo-500', label: '念のため', bg: 'bg-indigo-100/90' };
      }
      return null;
    }

    // --- 状態管理 ---
    // デフォルト指定とデータ構造リセットのためキーを更新(v4)
    const storageKey = 'fukan_weather_locations_v4';
    const defaultLocations = [
      { id: 1863958, name: '福岡市', admin: '福岡県', lat: 33.5902, lon: 130.4017 },
      { id: 1859642, name: '川崎市', admin: '神奈川県', lat: 35.5206, lon: 139.7172 }
    ];
    let savedLocations = JSON.parse(localStorage.getItem(storageKey)) || defaultLocations;
    let isEditMode = false;
    let currentWeatherData = []; 

    const matrixContainer = document.getElementById('matrixContainer');
    const emptyState = document.getElementById('emptyState');
    const loadingIndicator = document.getElementById('loadingIndicator');
    
    // --- 天気データ取得 ---
    async function fetchWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('API Error');
        return await res.json();
      } catch (err) {
        console.error(err);
        return null;
      }
    }

    async function fetchAndRenderAll() {
      if (savedLocations.length === 0) {
        matrixContainer.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      matrixContainer.innerHTML = '';
      loadingIndicator.classList.remove('hidden');

      const promises = savedLocations.map(loc => {
        return fetchWeather(loc.lat, loc.lon).then(data => ({ loc, data }));
      });

      currentWeatherData = await Promise.all(promises);
      loadingIndicator.classList.add('hidden');

      renderMatrix();
    }

    // --- マトリックス（表形式）描画 ---
    function renderMatrix() {
      matrixContainer.innerHTML = '';
      if (currentWeatherData.length === 0) return;

      // 基準となる日付リストを取得（正常にデータが取れた地点のものを使用）
      const validData = currentWeatherData.find(res => res && res.data && res.data.daily);
      if (!validData) {
        matrixContainer.innerHTML = `<div class="py-10 text-center text-slate-500 font-bold">データが取得できませんでした</div>`;
        return;
      }
      const dailyTimes = validData.data.daily.time;

      const editClass = isEditMode ? 'animate-pulse ring-2 ring-red-400 border-red-400' : 'border-slate-200';

      // テーブルコンテナ (横スクロール可能)
      let html = `
        <div class="overflow-x-auto w-full hide-scrollbar bg-white rounded-2xl shadow-sm border relative ${editClass} transition-all duration-300">
          <table class="w-full text-left border-collapse min-w-max">
            <thead>
              <tr>
                <!-- 左上角 (固定) -->
                <th class="sticky top-0 left-0 z-30 bg-slate-50 border-b border-r border-slate-200 w-14 sm:w-16 p-0 shadow-[1px_0_0_0_rgba(226,232,240,1)]"></th>
      `;
      
      // ヘッダー行: 地点名
      currentWeatherData.forEach(res => {
        const loc = res.loc;
        const isError = !res.data;
        const badgeScale = isEditMode ? 'scale-100' : 'scale-0';
        
        // 削除ボタン
        const deleteBadge = `
          <button onclick="removeLocation(${loc.id})" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full p-1 shadow-md z-40 transition-transform ${badgeScale}">
            <i class="ph ph-x text-xs font-bold leading-none"></i>
          </button>
        `;
        
        html += `
          <th class="sticky top-0 z-20 bg-slate-50 border-b border-r border-slate-100 w-24 sm:w-28 text-center py-2 px-1 relative last:border-r-0 align-middle">
            ${deleteBadge}
            <div class="text-sm font-bold truncate w-full text-slate-800 ${isError ? 'text-red-500' : ''}">${loc.name}</div>
            ${loc.admin && loc.admin !== loc.name ? `<div class="text-[9px] font-normal text-slate-400 truncate w-full mt-0.5">${loc.admin}</div>` : '<div class="text-[9px] opacity-0 mt-0.5">-</div>'}
          </th>
        `;
      });
      html += `</tr></thead><tbody>`;

      // データ行: 日付ごとのループ
      for (let i = 0; i < dailyTimes.length; i++) {
        const dateObj = new Date(dailyTimes[i]);
        const m = dateObj.getMonth() + 1;
        const d = dateObj.getDate();
        const dayOfWeek = dateObj.getDay();
        const dayStr = ['日', '月', '火', '水', '木', '金', '土'][dayOfWeek];
        
        const isToday = i === 0;
        const isTomorrow = i === 1;

        // 色分けロジック
        let dayColor = '';
        let labelColor = '';
        let stickyBgClass = '';
        let cellBgClass = '';

        if (isToday) {
          dayColor = 'text-emerald-700';
          labelColor = 'text-emerald-600';
          stickyBgClass = 'bg-emerald-50';
          cellBgClass = 'bg-emerald-50/40';
        } else if (dayOfWeek === 0) { // 日曜
          dayColor = 'text-red-600';
          labelColor = 'text-red-500';
          stickyBgClass = 'bg-red-50/60';
          cellBgClass = 'bg-white';
        } else if (dayOfWeek === 6) { // 土曜
          dayColor = 'text-blue-600';
          labelColor = 'text-blue-500';
          stickyBgClass = 'bg-blue-50/60';
          cellBgClass = 'bg-white';
        } else { // 平日
          dayColor = 'text-slate-700';
          labelColor = 'text-slate-500';
          stickyBgClass = 'bg-slate-50';
          cellBgClass = 'bg-white';
        }
        
        let dateLabel = '';
        if (isToday) dateLabel = `<div class="text-[10px] font-bold ${labelColor} mb-0.5 leading-none">今日</div>`;
        else if (isTomorrow) dateLabel = `<div class="text-[10px] font-bold ${labelColor} mb-0.5 leading-none">明日</div>`;
        else dateLabel = `<div class="text-[9px] font-bold ${labelColor} mb-0.5 leading-none">${dayStr}曜</div>`;

        html += `<tr>`;
        
        // 日付セル (左端固定)
        html += `
          <th class="sticky left-0 z-10 ${stickyBgClass} border-b border-r border-slate-200 text-center py-3 px-1 align-middle last:border-b-0 shadow-[1px_0_0_0_rgba(226,232,240,1)]">
            <div class="flex flex-col items-center justify-center">
              ${dateLabel}
              <div class="text-xs sm:text-sm font-bold ${dayColor}">${m}/${d}</div>
            </div>
          </th>
        `;

        // 各地点の天気セル
        currentWeatherData.forEach(res => {
          html += `<td class="${cellBgClass} border-b border-r border-slate-100 text-center py-3 px-1 relative align-middle last:border-r-0">`;
          
          if (!res.data) {
            html += `
              <div class="flex flex-col items-center justify-center">
                <i class="ph ph-warning-circle text-2xl text-red-300 mb-1"></i>
                <span class="text-[10px] text-red-400">エラー</span>
              </div>
            `;
          } else {
            const daily = res.data.daily;
            const code = daily.weathercode && daily.weathercode[i] !== undefined ? daily.weathercode[i] : -1;
            const info = getWeatherInfo(code);
            const maxTemp = daily.temperature_2m_max && daily.temperature_2m_max[i] !== undefined ? Math.round(daily.temperature_2m_max[i]) : '--';
            const minTemp = daily.temperature_2m_min && daily.temperature_2m_min[i] !== undefined ? Math.round(daily.temperature_2m_min[i]) : '--';
            
            let popDisplay = '';
            let umbrellaHtml = '';

            const hourly = res.data.hourly;
            let popAm = 0, popPm = 0;
            if (hourly && hourly.time && hourly.precipitation_probability) {
               const startIndex = hourly.time.findIndex(t => t.startsWith(dailyTimes[i]));
               if (startIndex !== -1) {
                  const amPops = hourly.precipitation_probability.slice(startIndex, startIndex + 12).map(v => v || 0);
                  if (amPops.length > 0) popAm = Math.max(...amPops);
                  const pmPops = hourly.precipitation_probability.slice(startIndex + 12, startIndex + 24).map(v => v || 0);
                  if (pmPops.length > 0) popPm = Math.max(...pmPops);
               }
            }

            // 傘判定 (1日の最高降水確率を使用)
            const maxPop = Math.max(popAm, popPm);
            const umbrella = getUmbrellaStatus(code, maxPop);
            if (umbrella) {
              umbrellaHtml = `<div class="absolute top-1.5 right-1.5 flex items-center gap-0.5 ${umbrella.bg} backdrop-blur-sm rounded text-[9px] px-1 py-0.5 border border-white/60 z-10"><i class="ph ${umbrella.icon} ${umbrella.color}"></i><span class="font-bold ${umbrella.color} leading-none">${umbrella.label}</span></div>`;
            }

            popDisplay = `
              ${umbrellaHtml}
              <div class="mt-2 text-[9px] font-bold text-slate-500 flex items-center justify-center w-full whitespace-nowrap">
                <span class="text-slate-400 mr-0.5">前</span>
                <span class="${popAm >= 40 ? 'text-blue-600' : 'text-blue-400'} w-[18px] text-left">${popAm}%</span>
                <span class="mx-0.5 text-slate-200 font-normal">|</span>
                <span class="text-slate-400 mr-0.5">後</span>
                <span class="${popPm >= 40 ? 'text-blue-600' : 'text-blue-400'} w-[18px] text-left">${popPm}%</span>
              </div>
            `;

            html += `
              <div class="flex flex-col items-center justify-center">
                <i class="ph ${info.icon} ${info.color} text-[1.8rem] sm:text-[2rem] drop-shadow-sm leading-none mb-1"></i>
                <div class="flex gap-1.5 sm:gap-2 text-xs sm:text-sm font-bold w-full justify-center">
                  <span class="text-red-500 text-right w-5 sm:w-6">${maxTemp}°</span>
                  <span class="text-blue-500 text-left w-5 sm:w-6">${minTemp}°</span>
                </div>
                ${popDisplay}
              </div>
            `;
          }
          html += `</td>`;
        });
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
      matrixContainer.innerHTML = html;
    }

    // --- 地点検索 ---
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const searchResultsList = document.getElementById('searchResultsList');
    const searchLoading = document.getElementById('searchLoading');

    searchForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = searchInput.value.trim();
      if (!query) return;

      searchInput.blur();
      searchResultsList.innerHTML = '';
      searchLoading.classList.remove('hidden');

      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=ja&format=json`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        searchLoading.classList.add('hidden');

        if (!data.results || data.results.length === 0) {
          searchResultsList.innerHTML = `
            <div class="text-center py-8 text-slate-500">
              <p>「${query}」が見つかりませんでした。</p>
            </div>
          `;
          return;
        }

        searchResultsList.innerHTML = data.results.map(result => {
          const isAdded = savedLocations.some(loc => loc.id === result.id);
          const adminName = result.admin1 ? result.admin1 : (result.country || '');
          
          return `
            <li class="px-2 py-1">
              <button 
                onclick="addLocation(${result.id}, '${result.name}', '${adminName}', ${result.latitude}, ${result.longitude})" 
                class="w-full text-left px-4 py-3 rounded-xl flex items-center justify-between active:bg-slate-100 transition-colors ${isAdded ? 'opacity-50 cursor-not-allowed' : ''}"
                ${isAdded ? 'disabled' : ''}
              >
                <div>
                  <span class="font-bold text-slate-700">${result.name}</span>
                  <span class="text-xs text-slate-400 ml-2">${adminName}</span>
                </div>
                ${isAdded ? '<i class="ph ph-check-circle text-blue-500 text-xl"></i>' : '<i class="ph ph-plus-circle text-slate-300 text-xl"></i>'}
              </button>
            </li>
          `;
        }).join('');

      } catch (err) {
        searchLoading.classList.add('hidden');
      }
    });

    window.addLocation = function(id, name, admin, lat, lon) {
      if (!savedLocations.some(loc => loc.id === id)) {
        savedLocations.push({ id, name, admin, lat, lon });
        localStorage.setItem(storageKey, JSON.stringify(savedLocations));
        fetchAndRenderAll();
      }
      closeModal();
    };

    window.removeLocation = function(id) {
      savedLocations = savedLocations.filter(loc => loc.id !== id);
      localStorage.setItem(storageKey, JSON.stringify(savedLocations));
      
      currentWeatherData = currentWeatherData.filter(res => res.loc.id !== id);
      
      if(savedLocations.length === 0) {
        matrixContainer.innerHTML = '';
        emptyState.classList.remove('hidden');
      } else {
        renderMatrix();
      }
    };

    // --- UI制御 ---
    const editBtn = document.getElementById('editBtn');
    editBtn.addEventListener('click', () => {
      isEditMode = !isEditMode;
      editBtn.textContent = isEditMode ? '完了' : '編集';
      editBtn.classList.toggle('text-red-500', isEditMode);
      editBtn.classList.toggle('text-blue-500', !isEditMode);
      
      renderMatrix(); // 編集モードUIへ再描画
    });

    const addModal = document.getElementById('addModal');
    const modalOverlay = document.getElementById('modalOverlay');

    function openModal() {
      searchInput.value = '';
      searchResultsList.innerHTML = `
        <div class="text-center py-12 text-slate-400">
          <i class="ph ph-buildings text-4xl mb-2 opacity-50"></i>
          <p class="text-sm">市区町村名を入力して検索してください</p>
        </div>
      `;
      addModal.style.display = 'flex';
      modalOverlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        addModal.classList.remove('modal-enter');
        addModal.classList.add('modal-enter-active');
        modalOverlay.classList.remove('opacity-0');
        modalOverlay.classList.add('opacity-100');
      });
    }

    function closeModal() {
      addModal.classList.remove('modal-enter-active');
      addModal.classList.add('modal-exit-active');
      modalOverlay.classList.remove('opacity-100');
      modalOverlay.classList.add('opacity-0');
      searchInput.blur();
      setTimeout(() => {
        addModal.style.display = 'none';
        addModal.classList.remove('modal-exit-active');
        addModal.classList.add('modal-enter');
        modalOverlay.classList.add('hidden');
      }, 300);
    }

    document.getElementById('addBtn').addEventListener('click', openModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);

    document.getElementById('refreshBtn').addEventListener('click', () => {
      const icon = document.getElementById('refreshBtn').querySelector('i');
      icon.classList.add('animate-spin');
      fetchAndRenderAll().then(() => setTimeout(() => icon.classList.remove('animate-spin'), 500));
    });

    fetchAndRenderAll();
  </script>
</body>
</html>
