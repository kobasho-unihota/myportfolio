          <p class="text-sm text-sub leading-6 mb-7">周期開始日を基準に、すべての記録を整理します。</p>
          <div class="mb-5"><label class="field-label" for="form-date">周期開始日 <span class="field-required">REQUIRED</span></label><input type="date" id="form-date" value="${r.start_date?Utils.toLocalYYYYMMDD(r.start_date):d}" class="form-control px-4 py-3 text-base" required></div>
          <div class="mb-5"><label class="field-label" for="form-type">周期タイプ</label><select id="form-type" class="form-control px-4 py-3 text-base"><option value="人工授精周期" ${r.type==='人工授精周期'?'selected':''}>人工授精周期</option><option value="タイミング周期" ${r.type==='タイミング周期'?'selected':''}>タイミング周期</option><option value="自然周期" ${r.type==='自然周期'?'selected':''}>自然周期</option><option value="お休み周期" ${r.type==='お休み周期'?'selected':''}>お休み周期</option></select></div>
          <div class="mb-6"><label class="field-label" for="form-status">ステータス</label><select id="form-status" class="form-control px-4 py-3 text-base"><option value="進行中" ${r.status==='進行中'?'selected':''}>進行中</option><option value="周期終了" ${r.status==='周期終了'?'selected':''}>周期終了</option></select></div>
          <input type="hidden" id="form-id" value="${r.id||''}"><div id="form-error" class="form-error hidden mb-4 rounded-[13px] px-4 py-3 text-xs font-bold" role="alert"></div>
          <button id="form-submit" onclick="App.submitForm('cycles')" data-default-label="${r.id?'変更を保存':'周期を保存'}" class="btn-primary w-full py-4 rounded-[15px] font-bold">${r.id?'変更を保存':'周期を保存'}</button>
          ${id?`<button onclick="App.deleteRecord('cycles','${id}',this)" class="w-full mt-3 py-3 rounded-[14px] border border-rose-200 bg-rose-50 text-rose-500 font-bold text-sm">この周期を削除</button>`:''}`;
      },

      meds: () => `<div class="py-10 text-center"><svg class="w-8 h-8 text-sub mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="m8 16 8-8m-6-2 8 8a4 4 0 0 1-6 6l-8-8a4 4 0 0 1 6-6Z"/></svg><p class="text-sm font-bold">準備中</p><p class="text-xs text-sub mt-2">この機能はまだ利用できません</p></div>`
    };

    const App = {
      chartInstance: null,
      isSubmitting: false,
      modalDirty: false,
      confirmCloseArmed: false,
      modalTrigger: null,

      async init() {
        this.render();
        document.getElementById('global-loading').classList.add('hidden');
        document.addEventListener('keydown', (event) => {
          const modal = document.getElementById('modal-sheet');
          if (!modal.classList.contains('open')) return;
          if (event.key === 'Escape') {
            this.closeModal();
            return;
          }
          if (event.key !== 'Tab') return;
          const focusable = [...modal.querySelectorAll('button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), summary, [tabindex]:not([tabindex="-1"])')]
            .filter(element => !element.hasAttribute('hidden') && element.offsetParent !== null);
          if (!focusable.length) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        });
      },

      render() {
        const { currentView, syncStatus } = Store.get();
        const content = document.getElementById('app-content');
        const nav = document.querySelector('nav');
        const isAuthGate = syncStatus === 'signed-out' || syncStatus === 'syncing' || syncStatus === 'error';

        if (syncStatus === 'error') {
          content.innerHTML = Views.syncError();
        } else if (syncStatus === 'signed-out' && currentView !== 'settings') {
          content.innerHTML = Views.authRequired();
        } else if (syncStatus === 'syncing' && currentView !== 'settings') {
          content.innerHTML = Views.syncing();
        } else {
          content.innerHTML = Views[currentView] ? Views[currentView]() : '';
        }
        content.classList.remove('hidden');
        nav.classList.toggle('hidden', isAuthGate);

        document.querySelectorAll('.nav-btn').forEach(btn => {
          if(btn.dataset.target === currentView) {
            btn.classList.add('text-primary'); btn.classList.remove('text-sub');
            btn.setAttribute('aria-current', 'page');
          } else {
            btn.classList.remove('text-primary'); btn.classList.add('text-sub');
            btn.removeAttribute('aria-current');
          }
        });

        if (currentView === 'records') {
          setTimeout(() => this.renderChart(), 50);
        }
      },

      changeRecordsCycle(id) {
        Store.set({ selectedCycleId: id });
      },

      renderChart() {
        const canvas = document.getElementById('tempChart');
        if (!canvas) return;

        const { daily, iui, selectedCycleId, activeCycle, cycles, aiPredictions } = Store.get();
        const targetCycleId = selectedCycleId || (activeCycle ? activeCycle.id : null);
        const targetCycle = cycles.find(c => c.id === targetCycleId);
        const baseTemp = Number(Store.get().settings.baseTemp || 36.70);
        
        if (!targetCycle) {
          if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }
          const emptyEl = document.getElementById('tempChart-empty');
          if (emptyEl) emptyEl.classList.remove('hidden');
          return;
        }

        const isTiming = targetCycle.type === 'タイミング周期' || targetCycle.type === '自然周期';

        const aiPrediction = aiPredictions.find(p => p.cycle_id === targetCycleId);

        let startDateStr = Utils.toLocalYYYYMMDD(targetCycle.start_date);
        let endDateStr = '9999-12-31';
        
        const sortedCycles = [...cycles].sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        const targetIndex = sortedCycles.findIndex(c => c.id === targetCycleId);
        
        if (targetIndex !== -1 && targetIndex < sortedCycles.length - 1) {
          endDateStr = Utils.toLocalYYYYMMDD(sortedCycles[targetIndex + 1].start_date);
        } else {
          if (aiPrediction && aiPrediction.next_period_date) {
            endDateStr = Utils.toLocalYYYYMMDD(aiPrediction.next_period_date);
          } else {
            const preds = App.getPredictions();
            endDateStr = preds.period ? preds.period : Utils.toLocalYYYYMMDD(Utils.addDays(startDateStr, Store.get().settings.cycleLen));
          }
        }

        const cycleDaily = daily
          .filter(d => {
             const dStr = Utils.toLocalYYYYMMDD(d.date);
             return d.temperature && dStr >= startDateStr && dStr < endDateStr;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        const emptyEl = document.getElementById('tempChart-empty');
        if (cycleDaily.length === 0) {
          if (emptyEl) emptyEl.classList.remove('hidden');
        } else {
          if (emptyEl) emptyEl.classList.add('hidden');
        }
        
        let actualEndDateStr = endDateStr;
        if (cycleDaily.length > 0) {
            const lastDataDateStr = Utils.toLocalYYYYMMDD(cycleDaily[cycleDaily.length - 1].date);
            if (actualEndDateStr <= lastDataDateStr) {
                actualEndDateStr = Utils.toLocalYYYYMMDD(Utils.addDays(lastDataDateStr, 1));
            }
        }

        const cycleIuiDates = iui
          .filter(ev => {
             const dStr = Utils.toLocalYYYYMMDD(ev.actual_date || ev.planned_date);
             return dStr && dStr >= startDateStr && dStr < actualEndDateStr;
          })
          .map(ev => Utils.toLocalYYYYMMDD(ev.actual_date || ev.planned_date));

        let ovulationDateStr = null;
        if (aiPrediction && aiPrediction.ovulation_date) {
            ovulationDateStr = Utils.toLocalYYYYMMDD(aiPrediction.ovulation_date);
        }

        const labels = [];
        const data = [];
        const pointColors = [];
        const pointRadii = [];
        const pointStyles = [];

        let curDStr = startDateStr;
        let limit = 0;
        
        while (curDStr < actualEndDateStr && limit < 60) {
          labels.push(Utils.formatMMDD(new Date(curDStr)));
          
          const dRec = cycleDaily.find(d => Utils.toLocalYYYYMMDD(d.date) === curDStr);
          data.push(dRec ? parseFloat(dRec.temperature) : null); 

          let color = '#334155'; // primary (slate-700)
          let radius = dRec ? 4 : 0;
          let style = 'circle';

          if (cycleIuiDates.includes(curDStr)) {
            color = isTiming ? '#ec4899' : '#3b82f6'; // pink-500 or blue-500
            radius = dRec ? 8 : 0;
            style = 'rectRot';
          } else if (curDStr === ovulationDateStr) {
            color = '#14b8a6'; // teal-500
            radius = dRec ? 8 : 0;
            style = 'triangle';
          }

          pointColors.push(color);
          pointRadii.push(radius);
          pointStyles.push(style);

          curDStr = Utils.toLocalYYYYMMDD(Utils.addDays(curDStr, 1));
          limit++;
        }

        if (this.chartInstance) {
          this.chartInstance.destroy();
        }

        const ctx = canvas.getContext('2d');

        // 基準線と背景色を塗るカスタムプラグイン
        const horizontalLinePlugin = {
          id: 'horizontalLine',
          beforeDraw: chart => {
            const yValue = baseTemp;
            const yAxis = chart.scales.y;
            const yPos = yAxis.getPixelForValue(yValue);
            
            if (yPos >= yAxis.top && yPos <= yAxis.bottom) {
                const ctx = chart.ctx;
                ctx.save();

                // 高温期エリアの背景をほんのり赤色に
                ctx.fillStyle = 'rgba(254, 226, 226, 0.4)'; // rose-100の透明
                ctx.fillRect(chart.chartArea.left, yAxis.top, chart.chartArea.right - chart.chartArea.left, yPos - yAxis.top);

                // 低温期エリアの背景をほんのり青色に
                ctx.fillStyle = 'rgba(241, 245, 249, 0.4)'; // slate-100の透明
                ctx.fillRect(chart.chartArea.left, yPos, chart.chartArea.right - chart.chartArea.left, yAxis.bottom - yPos);

                // 基準線（破線）を描画
                ctx.beginPath();
                ctx.moveTo(chart.chartArea.left, yPos);
                ctx.lineTo(chart.chartArea.right, yPos);
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = 'rgba(244, 63, 94, 0.5)'; // rose-500
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                
                ctx.restore();
            }
          }
        };

        this.chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '基礎体温',
              data: data,
              borderColor: '#334155',
              backgroundColor: 'rgba(51, 65, 85, 0.2)',
              borderWidth: 2,
              pointBackgroundColor: pointColors,
              pointBorderColor: pointColors,
              pointRadius: pointRadii,
              pointStyle: pointStyles,
              tension: 0.3,
              spanGaps: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
              legend: { display: false },
              tooltip: { callbacks: { label: function(context) { return context.parsed.y ? context.parsed.y.toFixed(2) + ' °C' : ''; } } }
            },
            scales: {
              y: {
                suggestedMin: 36.0,
                suggestedMax: 37.2,
                ticks: { 
                  stepSize: 0.2, 
                  font: { size: 10 },
                  callback: function(value) { return value.toFixed(2); }
                },
                grid: { color: '#f1f5f9' }
              },
              x: {
                ticks: { 
                  font: { size: 9 },
                  maxRotation: 45
                },
                grid: { display: false }
              }
            }
          },
          plugins: [horizontalLinePlugin]
        });
      },

      navigate(view) { Store.set({ currentView: view }); window.scrollTo(0,0); },
      
      switchDashTab(tab) { Store.set({ dashTab: tab }); },

      openModal(type, id = null, defaultDate = null) {
        this.isSubmitting = false;
        this.modalDirty = false;
        this.confirmCloseArmed = false;
        this.modalTrigger = document.activeElement;
        if (type === 'daily' && !id) {
          const targetDate = defaultDate || Utils.getTodayStr();
          const existing = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === targetDate);
          if (existing) id = existing.id;
        }
        document.getElementById('modal-title').innerText = getFormTitle(type);
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = Forms[type](id, defaultDate);
        modalBody.oninput = () => { this.modalDirty = true; };
        modalBody.onchange = () => { this.modalDirty = true; };
        
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth;
        overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
        sheet.classList.remove('closed'); sheet.classList.add('open');
        sheet.removeAttribute('inert');
        sheet.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        setTimeout(() => {
          const firstField = document.querySelector('#modal-body input:not([type="hidden"]), #modal-body select, #modal-body textarea');
          firstField?.focus({ preventScroll: true });
        }, 220);
      },

      closeModal(force = false) {
        if (this.isSubmitting && !force) return;
        if (this.modalDirty && !force) {
          if (!this.confirmCloseArmed) {
            this.confirmCloseArmed = true;
            Utils.showToast('入力内容があります。もう一度閉じると破棄します', true);
            setTimeout(() => { this.confirmCloseArmed = false; }, 3000);
            return;
          }
        }
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        if (this.modalTrigger && typeof this.modalTrigger.focus === 'function') {
          this.modalTrigger.focus({ preventScroll: true });
        }
        sheet.classList.remove('open'); sheet.classList.add('closed');
        sheet.setAttribute('aria-hidden', 'true');
        sheet.setAttribute('inert', '');
        overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
        document.body.style.overflow = '';
        this.modalDirty = false;
        this.confirmCloseArmed = false;
        setTimeout(() => {
          overlay.classList.add('hidden');
          this.modalTrigger = null;
        }, 300);
      },

      getCycleForDate(dateStr) {
        const { cycles } = Store.get();
        if (!cycles.length) return null;
        const sorted = [...cycles].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
        for (const c of sorted) {
          if (dateStr >= Utils.toLocalYYYYMMDD(c.start_date)) return c;
        }
        return null;
      },
      
      getCycleTypeForDate(dateStr) {
        const { cycles } = Store.get();
        if (!cycles || cycles.length === 0) return null;
        const sorted = [...cycles].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
        for (const c of sorted) {
          if (dateStr >= Utils.toLocalYYYYMMDD(c.start_date)) return c.type;
        }
        return null;
      },

      checkExistingDaily(dateStr) {
        const r = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === dateStr);
        const idField = document.getElementById('form-id');
        const tempField = document.getElementById('form-temp');
        const originalId = document.getElementById('form-original-id')?.value || '';
        idField.value = r ? r.id : originalId;
        if (r) {
          tempField.value = r.temperature || '';
        } else if (!originalId) {
          tempField.value = '';
        }
        const note = document.getElementById('form-existing-note');
        const submit = document.getElementById('form-submit');
        note?.classList.toggle('hidden', !r && !originalId);
        if (submit) {
          const label = r || originalId ? '変更を保存' : '記録を保存';
          submit.dataset.defaultLabel = label;
          submit.innerText = label;
        }
      },

      setFormError(message = '') {
        const error = document.getElementById('form-error');
        if (!error) return;
        error.innerText = message;
        error.classList.toggle('hidden', !message);
        if (message) error.scrollIntoView({ behavior: 'smooth', block: 'center' });
      },

      setSubmitState(isSaving) {
        const button = document.getElementById('form-submit');
        this.isSubmitting = isSaving;
        if (!button) return;
        button.disabled = isSaving;
        button.setAttribute('aria-busy', isSaving ? 'true' : 'false');
        button.innerText = isSaving ? '保存しています…' : (button.dataset.defaultLabel || '保存する');
      },

      toggleActualDate(isDone, eventLabel) {
        const wrap = document.getElementById('form-actual-date-wrap');
        const text = document.getElementById('form-actual-text');
        wrap?.classList.toggle('hidden', !isDone);
        if (text) text.innerText = isDone ? `${eventLabel}済みとして実施日を保存します` : '未実施（予定）';
        this.modalDirty = true;
      },

      validateForm(table, payload) {
        if (table === 'daily') {
          if (!payload.date) return '日付を選択してください。';
          if (payload.date > Utils.getTodayStr()) return '基礎体温は今日以前の日付で記録してください。';
          if (payload.temperature === '') return '基礎体温を入力してください。';
          const temperature = Number(payload.temperature);
          if (!Number.isFinite(temperature) || temperature < 34 || temperature > 42) {
            return '基礎体温は34.00〜42.00°Cの範囲で入力してください。';
          }
        }
        if (table === 'clinic') {
          if (!payload.visit_date) return '受診日を選択してください。';
          if (payload.visit_date > Utils.getTodayStr()) return '受診日は今日以前の日付を選択してください。';
          if (payload.next_visit_date && payload.next_visit_date < payload.visit_date) {
            return '次回受診日は受診日以降の日付を選択してください。';
          }
        }
        if (table === 'iui') {
          if (!payload.planned_date) return '予定日を選択してください。';
          if (payload.is_done && !payload.actual_date) return '実施日を選択してください。';
        }
        if (table === 'cycles') {
          if (!payload.start_date) return '生理開始日を選択してください。';
          if (payload.start_date > Utils.getTodayStr()) return '生理開始日は今日以前の日付を選択してください。';
          const duplicate = Store.get().cycles.some(cycle =>
            cycle.id !== payload.id && Utils.toLocalYYYYMMDD(cycle.start_date) === payload.start_date
          );
          if (duplicate) return '同じ開始日の周期がすでに登録されています。';
          const currentCycle = Store.get().cycles.find(cycle => cycle.id === payload.id);
          if (currentCycle && Utils.toLocalYYYYMMDD(currentCycle.start_date) !== payload.start_date) {
            const state = Store.get();
            const linkedCount = [...state.daily, ...state.clinic, ...state.iui, ...state.aiPredictions]
              .filter(item => item.cycle_id === payload.id).length;
            if (linkedCount > 0) return `関連する記録が${linkedCount}件あるため、開始日は変更できません。`;
          }
        }
        return '';
      },

      async submitForm(table) {
        if (this.isSubmitting) return;
        const id = document.getElementById('form-id')?.value;
        const payload = { id };

        if (table === 'daily') {
          payload.date = document.getElementById('form-date').value;
          payload.temperature = document.getElementById('form-temp').value;
        } else if (table === 'clinic') {
          payload.visit_date = document.getElementById('form-date').value;
          payload.next_visit_date = document.getElementById('form-next').value;
        } else if (table === 'iui') {
          payload.planned_date = document.getElementById('form-planned').value;
          payload.is_done = document.getElementById('form-actual-check').checked;
          payload.actual_date = payload.is_done ? document.getElementById('form-actual-date').value : '';
        } else if (table === 'cycles') {
          payload.start_date = document.getElementById('form-date').value;
          payload.type = document.getElementById('form-type').value;
          payload.status = document.getElementById('form-status').value;
        }

        const validationError = this.validateForm(table, payload);
        if (validationError) {
          this.setFormError(validationError);
          return;
        }
        if (table === 'daily') payload.temperature = Number(payload.temperature).toFixed(2);
        delete payload.is_done;

        this.setFormError('');
        this.setSubmitState(true);
        const dbTable = table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles';
        const saved = await API.save(dbTable, payload);
        if (!saved) this.setSubmitState(false);
      },

      async deleteRecord(table, id, btnEl) {
        if (table === 'cycles') {
          const state = Store.get();
          const linkedCount = [...state.daily, ...state.clinic, ...state.iui, ...state.aiPredictions]
            .filter(item => item.cycle_id === id).length;
          if (linkedCount > 0) {
            Utils.showToast(`関連する記録が${linkedCount}件あるため、この周期は削除できません`, true);
            return;
          }
        }
        if (!btnEl.dataset.confirm) {
           btnEl.dataset.confirm = "true";
           btnEl.classList.add('bg-rose-500', 'text-white');
           btnEl.classList.remove('bg-rose-50', 'text-rose-500', 'border-rose-200');
           btnEl.innerText = '本当に削除しますか？';
           setTimeout(() => {
              if (btnEl) {
                 btnEl.dataset.confirm = "";
                 btnEl.classList.remove('bg-rose-500', 'text-white');
                 btnEl.classList.add('bg-rose-50', 'text-rose-500', 'border-rose-200');
                 btnEl.innerText = 'この記録を削除';
              }
           }, 3000);
           return;
        }
        
        const dbTable = table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles';

        try {
          await window.FirebaseSync?.delete(dbTable, id);
          App.closeModal(true);
          Utils.showToast('削除しました');
        } catch(e) {
          console.warn('Firestore delete error:', e);
          Utils.showToast('削除できませんでした', true);
        }
      },

      getCycleStats() {
        const { cycles } = Store.get();
        const lengths = [];
        for (let i = 0; i < cycles.length - 1; i++) {
          const s1 = new Date(cycles[i].start_date);
          const s2 = new Date(cycles[i+1].start_date);
          const days = Math.round((s2 - s1) / 86400000);
          if (days >= 20 && days <= 50) lengths.push(days);
        }
        if (lengths.length === 0) return { avg: 31, median: 31, count: 0 };
        const avg = Math.round(lengths.reduce((a,b)=>a+b, 0) / lengths.length);
        lengths.sort((a,b)=>a-b);
        const mid = Math.floor(lengths.length / 2);
        const median = lengths.length % 2 !== 0 ? lengths[mid] : Math.round((lengths[mid - 1] + lengths[mid]) / 2);
        return { avg, median, count: lengths.length };
      },

      getBaseTempStat() {
        const { daily } = Store.get();
        const temps = daily.filter(d => d.temperature).map(d => parseFloat(d.temperature));
        if (temps.length === 0) return 36.70;
        const avg = temps.reduce((a, b) => a + b, 0) / temps.length;
        return Math.round(avg * 100) / 100;
      },

      async applyCycleStat(val) {
        document.getElementById('set-cycle-len').value = val;
        const saved = await this.updateSettings('cycleLen', val);
        if (saved) Utils.showToast(`${val}日に設定しました`);
      },

      async applyBaseTempStat(val) {
        document.getElementById('set-base-temp').value = val.toFixed(2);
        const saved = await this.updateSettings('baseTemp', val);
        if (saved) Utils.showToast(`基準線を${val.toFixed(2)}℃に設定しました`);
      },

      getPredictions() {
        const { activeCycle, iui, settings, cycles, aiPredictions } = Store.get();
        let preds = { 
          iui: null, abstain: null, period: null, isIUIDone: false, actual: null, isPredictedIUI: false, isAIPeriod: false,
          futureCycles: [] 
        };
        if (!activeCycle) return preds;
        
        const isRestCycle = activeCycle.type === 'お休み周期';

        let totalIuiPhase = 0;
        let countIuiPhase = 0;
        let totalLutealPhase = 0;
        let countLutealPhase = 0;

        cycles.forEach(c => {
          if (c.id === activeCycle.id) return; 
          const cIuis = iui.filter(x => x.cycle_id === c.id);
          const cIui = cIuis[cIuis.length - 1]; 
          const nextC = cycles.find(nc => new Date(nc.start_date) > new Date(c.start_date));

          if (cIui && (cIui.actual_date || cIui.planned_date)) {
            const iuiDate = new Date(cIui.actual_date || cIui.planned_date);
            const startDate = new Date(c.start_date);
            const iuiPhase = Math.floor((iuiDate - startDate) / 86400000);
            if (iuiPhase > 0 && iuiPhase < 40) {
              totalIuiPhase += iuiPhase;
              countIuiPhase++;
            }
            if (nextC) {
              const nextStartDate = new Date(nextC.start_date);
              const lutealPhase = Math.floor((nextStartDate - iuiDate) / 86400000);
              if (lutealPhase > 0 && lutealPhase < 25) {
                totalLutealPhase += lutealPhase;
                countLutealPhase++;
              }
            }
          }
        });

        const avgIuiPhase = countIuiPhase > 0 ? Math.round(totalIuiPhase / countIuiPhase) : (settings.cycleLen > 14 ? settings.cycleLen - 14 : 14);
        const avgLutealPhase = countLutealPhase > 0 ? Math.round(totalLutealPhase / countLutealPhase) : 14;
        
        const cycleIUI = iui
          .filter(i => i.cycle_id === activeCycle.id)
          .sort((a, b) => String(a.actual_date || a.planned_date || '').localeCompare(String(b.actual_date || b.planned_date || '')));
        const latestIUI = cycleIUI[cycleIUI.length - 1];
        
        const startD = activeCycle.start_date;
        
        if (latestIUI && (latestIUI.planned_date || latestIUI.actual_date)) {
          preds.isIUIDone = !!latestIUI.actual_date;
          if (latestIUI.planned_date) {
            preds.iui = Utils.toLocalYYYYMMDD(latestIUI.planned_date);
            preds.abstain = Utils.toLocalYYYYMMDD(Utils.addDays(latestIUI.planned_date, -settings.abstainDays));
          }
          if (preds.isIUIDone) {
            preds.actual = Utils.toLocalYYYYMMDD(latestIUI.actual_date);
          }
          const baseIuiDate = preds.actual || preds.iui;
          preds.period = Utils.toLocalYYYYMMDD(Utils.addDays(baseIuiDate, avgLutealPhase));
        } else {
          if (isRestCycle) {
             preds.iui = null;
             preds.abstain = null;
             preds.period = Utils.toLocalYYYYMMDD(Utils.addDays(startD, settings.cycleLen));
             preds.isPredictedIUI = false;
          } else {
             const estIui = Utils.addDays(startD, avgIuiPhase);
             preds.iui = Utils.toLocalYYYYMMDD(estIui);
             preds.abstain = Utils.toLocalYYYYMMDD(Utils.addDays(estIui, -settings.abstainDays));
             preds.period = Utils.toLocalYYYYMMDD(Utils.addDays(estIui, avgLutealPhase));
             preds.isPredictedIUI = true;
          }
        }

        const aiPrediction = aiPredictions.find(p => p.cycle_id === activeCycle.id);
        if (aiPrediction && aiPrediction.ovulation_date && aiPrediction.next_period_date) {
            preds.period = Utils.toLocalYYYYMMDD(aiPrediction.next_period_date);
            preds.isAIPeriod = true;
        }
        
        if (preds.period) {
          for (let i = 1; i <= 3; i++) {
            const prevPeriodObj = i === 1 ? new Date(preds.period) : new Date(preds.futureCycles[i - 2].period);
            
            const fIuiObj = Utils.addDays(prevPeriodObj, avgIuiPhase);
            const fAbstainObj = fIuiObj ? Utils.addDays(fIuiObj, -settings.abstainDays) : null;
            const fPeriodObj = Utils.addDays(fIuiObj, avgLutealPhase);
            
            preds.futureCycles.push({
              period: Utils.toLocalYYYYMMDD(fPeriodObj),
              iui: Utils.toLocalYYYYMMDD(fIuiObj),
              abstain: Utils.toLocalYYYYMMDD(fAbstainObj)
            });
          }
        }
        
        return preds;
      },

      getPeriodDates() {
        const { cycles, settings } = Store.get();
        const preds = App.getPredictions();
        const periodDates = new Set();
        
        const addDates = (startStr) => {
          if (!startStr) return;
          for (let i = 0; i < settings.periodDays; i++) {
            const dateStr = Utils.toLocalYYYYMMDD(Utils.addDays(startStr, i));
            if (dateStr) periodDates.add(dateStr);
          }
        };

        cycles.forEach(c => addDates(c.start_date));
        addDates(preds.period);
        preds.futureCycles.forEach(fc => addDates(fc.period));
        
        return periodDates;
      },

      getAbstainDates() {
        const { iui, settings } = Store.get();
        const preds = App.getPredictions();
        const abstainDates = new Set();
        
        const addDates = (abstainStr, iuiStr) => {
          if (!abstainStr || !iuiStr) return;
          let currentStr = abstainStr;
          let safety = 0;
          while (currentStr < iuiStr && safety < 15) { 
            abstainDates.add(currentStr);
            currentStr = Utils.toLocalYYYYMMDD(Utils.addDays(currentStr, 1));
            safety++;
          }
        };

        iui.forEach(ev => {
          if (ev.planned_date) {
            const iuiStr = Utils.toLocalYYYYMMDD(ev.planned_date);
            const abstainStr = Utils.toLocalYYYYMMDD(Utils.addDays(ev.planned_date, -settings.abstainDays));
            addDates(abstainStr, iuiStr);
          }
        });

        addDates(preds.abstain, preds.iui);
        preds.futureCycles.forEach(fc => addDates(fc.abstain, fc.iui));
        
        return abstainDates;
      },

      goToday() {
        const now = new Date();
        Store.set({ calMonth: new Date(now.getFullYear(), now.getMonth(), 1) });
      },

      changeMonth(delta) {
        const current = Store.get().calMonth;
        const nextMonth = new Date(current.getFullYear(), current.getMonth() + delta, 1);
        Store.set({ calMonth: nextMonth });
      },

      selectDate(dStr) {
        document.querySelectorAll('[id^="cal-cell-"]').forEach(el => {
          el.classList.remove('bg-primary', 'text-white');
          el.setAttribute('aria-pressed', 'false');
          const dot = el.querySelector('.bg-white');
          if(dot) dot.classList.replace('bg-white', 'bg-primary');
        });
        
        const targetEl = document.getElementById(`cal-cell-${dStr}`);
        if(targetEl) {
          targetEl.classList.add('bg-primary', 'text-white');
          targetEl.setAttribute('aria-pressed', 'true');
          const dot = targetEl.querySelector('.bg-primary');
          if(dot && targetEl.classList.contains('bg-primary')) dot.classList.replace('bg-primary', 'bg-white');
        }

        const { daily, clinic, cycles, iui, settings, aiPredictions } = Store.get();
        const preds = App.getPredictions();
        const aiOvulationDates = aiPredictions.map(p => Utils.toLocalYYYYMMDD(p.ovulation_date)).filter(d => d);
        
        const cycleStarts = cycles.map(c => Utils.toLocalYYYYMMDD(c.start_date));
        const iuiDates = iui.map(ev => Utils.toLocalYYYYMMDD(ev.planned_date)).filter(d => d);
        const abstainStartDates = iuiDates.map(dateStr => Utils.toLocalYYYYMMDD(Utils.addDays(dateStr, -settings.abstainDays)));

        const futurePeriods = preds.futureCycles.map(fc => fc.period);
        const futureIuis = preds.futureCycles.map(fc => fc.iui);
        
        const evType = App.getCycleTypeForDate(dStr);
        const isTimingEv = evType === 'タイミング周期' || evType === '自然周期';
        const mainIcon = isTimingEv ? '💕' : '📌';
        const eventLabelText = isTimingEv ? 'タイミング' : 'IUI';
        const preLabelText = isTimingEv ? 'タイミング推奨' : '禁欲期間';
        const preIcon = isTimingEv ? '💓' : '❌';
        const mainColor = isTimingEv ? 'text-pink-500' : 'text-blue-500';
        const preColor = isTimingEv ? 'text-pink-400' : 'text-slate-500';
        const preColorPred = isTimingEv ? 'text-pink-400/70' : 'text-slate-500/70';
        
        let eventContent = '';
        
        const makeEventRow = (title, colorClass, date) => `
          <div class="mb-2 flex justify-between items-center">
            <span class="text-[13px] font-bold ${colorClass}">${title}</span>
            <button onclick="App.openCalendarLink('${title}', '${date}')" class="text-[10px] bg-white border border-border text-sub px-2.5 py-1 rounded-lg shadow-sm active:bg-slate-50 transition-colors font-bold flex items-center gap-1"><span class="text-[10px] leading-none">＋</span>追加</button>
          </div>
        `;
        
        if (iuiDates.includes(dStr)) eventContent += makeEventRow(`${mainIcon} ${eventLabelText}実施日`, mainColor, dStr);
        else if (dStr === preds.iui && !preds.isPredictedIUI) eventContent += makeEventRow(`${mainIcon} ${eventLabelText}予定日`, mainColor, dStr);
        else if (dStr === preds.iui && preds.isPredictedIUI) eventContent += makeEventRow(`${mainIcon} ${eventLabelText}目安 (予測)`, `${mainColor}/70`, dStr);
        else if (futureIuis.includes(dStr)) eventContent += makeEventRow(`${mainIcon} ${eventLabelText}目安 (予測)`, `${mainColor}/70`, dStr);
        
        if (cycleStarts.includes(dStr)) eventContent += makeEventRow('🩸 生理開始日', 'text-rose-500', dStr);
        else if (dStr === preds.period) eventContent += makeEventRow(preds.isAIPeriod ? '✨ 次回生理予定 (AI分析)' : '🩸 次回生理予定日', 'text-rose-500', dStr);
        else if (futurePeriods.includes(dStr)) eventContent += makeEventRow('🩸 生理予定日 (予測)', 'text-rose-500/70', dStr);

        if (aiOvulationDates.includes(dStr)) {
          eventContent += makeEventRow('🥚 排卵日 (AI推測)', 'text-teal-600', dStr);
        }

        const isPeriod = App.getPeriodDates().has(dStr);
        const isPeriodStart = cycleStarts.includes(dStr) || dStr === preds.period || futurePeriods.includes(dStr);
        if (isPeriod && !isPeriodStart) {
          eventContent += `<div class="mb-2 flex justify-between items-center"><span class="text-[13px] font-bold text-rose-500/70">🩸 生理期間</span><div></div></div>`;
        }

        const isAbstain = App.getAbstainDates().has(dStr);
        
        if (isAbstain) {
          const isConfirmed = abstainStartDates.some(sd => {
             const ev = iui.find(x => Utils.toLocalYYYYMMDD(Utils.addDays(x.planned_date, -settings.abstainDays)) === sd);
             if(ev && dStr >= sd && dStr < Utils.toLocalYYYYMMDD(ev.planned_date)) return true;
             return false;
          }) || (dStr >= preds.abstain && dStr < preds.iui && !preds.isPredictedIUI);

          if (isConfirmed) {
            eventContent += makeEventRow(`${preIcon} ${preLabelText}`, preColor, dStr);
          } else {
            eventContent += makeEventRow(`${preIcon} ${preLabelText} (予測)`, preColorPred, dStr);
          }
        }

        const dRec = daily.find(r => Utils.toLocalYYYYMMDD(r.date) === dStr);
        const cRec = clinic.find(r => Utils.toLocalYYYYMMDD(r.visit_date) === dStr);
        const iRec = iui.find(r => Utils.toLocalYYYYMMDD(r.planned_date) === dStr || Utils.toLocalYYYYMMDD(r.actual_date) === dStr);
        
        let content = '';
        if(eventContent) content += `<div class="mb-3 pb-2 border-b border-border/50">${eventContent}</div>`;
        if(dRec) {
          content += `<div class="mb-1 text-[14px] text-main">🌡 体温: <span class="font-bold">${dRec.temperature || '-'}</span> °C</div>`;
        }
        if(cRec) content += `<div class="text-[14px] mb-1 text-main">🏥 受診記録あり</div>`;
        if(iRec && iRec.actual_date) content += `<div class="text-[14px] ${mainColor}">${mainIcon} ${eventLabelText}実施済み</div>`;
        
        const actionHtml = `
          <div class="grid grid-cols-3 gap-2 mt-4">
            <button class="w-full py-2.5 rounded-xl border border-border text-sub font-bold text-[12px] bg-slate-50 active:bg-slate-100 transition-colors" onclick="App.openModal('daily', '${dRec?dRec.id:''}', '${dStr}')">🌡 体温</button>
            <button class="w-full py-2.5 rounded-xl border border-border text-sub font-bold text-[12px] bg-slate-50 active:bg-slate-100 transition-colors" onclick="App.openModal('clinic', '${cRec?cRec.id:''}', '${dStr}')">🏥 通院</button>
            <button class="w-full py-2.5 rounded-xl border ${isTimingEv ? 'border-pink-200 text-pink-500 bg-pink-50 active:bg-pink-100' : 'border-blue-200 text-blue-600 bg-blue-50 active:bg-blue-100'} font-bold text-[12px] transition-colors" onclick="App.openModal('iui', '${iRec?iRec.id:''}', '${dStr}')">${mainIcon} ${eventLabelText}</button>
          </div>
        `;

        document.getElementById('cal-detail-area').innerHTML = `
          <div class="text-sm font-bold text-sub mb-3">${dStr.replace(/-/g, '/')}</div>
          <div class="card-soft p-4 rounded-[20px]">
            ${content ? content : `<div class="text-sub text-sm">記録なし</div>`}
            ${actionHtml}
          </div>
        `;
      },

      async updateSettings(key, val) {
        const previous = { ...Store.get().settings };
        const next = { ...previous };
        const parsed = key === 'baseTemp' ? parseFloat(val) : parseInt(val, 10);
        const invalidCycle = key === 'cycleLen' && (!Number.isFinite(parsed) || parsed < 20 || parsed > 60);
        const invalidTemp = key === 'baseTemp' && (!Number.isFinite(parsed) || parsed < 34 || parsed > 42);
        if (invalidCycle || invalidTemp || !Number.isFinite(parsed)) {
          Utils.showToast(invalidCycle ? '平均周期は20〜60日の範囲で入力してください' : '基準線は34.00〜42.00°Cで入力してください', true);
          Store.set({ settings: previous });
          return false;
        }
        next[key] = parsed;
        Store.set({ settings: next });
        try {
          await window.FirebaseSync?.saveSetting(key, parsed);
          return true;
        } catch (e) {
          console.warn('Firestore settings save error:', e);
          Store.set({ settings: previous });
          Utils.showToast('設定を保存できませんでした。元の値に戻しました', true);
          return false;
        }
      },
      
      async updateApiKey(val) {
        const previous = Store.get().apiKey;
        const key = val.trim();
        Store.set({ apiKey: key });
        try {
          await window.FirebaseSync?.saveApiKey(key);
          Utils.showToast('APIキーを保存しました');
        } catch (e) {
          console.warn('Firestore API key save error:', e);
          Store.set({ apiKey: previous });
          Utils.showToast('APIキーを保存できませんでした。元の値に戻しました', true);
        }
      },

      async updateAiMemo(cycleId, value) {
        if (!cycleId) return;
        const previous = { ...Store.get().aiMemos };
        const aiMemos = { ...previous, [cycleId]: value };
        Store.set({ aiMemos });
        try {
          await window.FirebaseSync?.saveAiMemo(cycleId, value);
          Utils.showToast('AIメモを保存しました');
        } catch (e) {
          console.warn('Firestore AI memo save error:', e);
          Store.set({ aiMemos: previous });
          Utils.showToast('AIメモを保存できませんでした。元の内容に戻しました', true);
        }
      },

      async togglePrivacy() {
        const previous = Boolean(Store.get().settings.privacyMode);
        Store.set({ settings: { ...Store.get().settings, privacyMode: !previous } });
        try {
          await window.FirebaseSync?.saveSetting('privacyMode', !previous);
        } catch (e) {
          console.warn('Privacy setting save error:', e);
          Store.set({ settings: { ...Store.get().settings, privacyMode: previous } });
          Utils.showToast('表示設定を保存できませんでした', true);
        }
      },

      exportData() {
        this.openModal('export-confirm');
      },

      confirmExport() {
        const { cycles, daily, clinic, iui, aiPredictions, aiMemos, settings } = Store.get();
        const payload = {
          exportedAt: new Date().toISOString(),
          formatVersion: 1,
          cycles,
          dailyRecords: daily,
          clinicVisits: clinic,
          iuiEvents: iui,
          aiPredictions,
          aiMemos,
          settings,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `rhythm-backup-${Utils.getTodayStr()}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        this.closeModal(true);
        Utils.showToast('データを書き出しました');
      },

      async signInToSync() {
        try {
          await window.FirebaseSync?.signIn();
          Utils.showToast('Firebase同期を開始しました');
        } catch (e) {
          console.warn('Firebase sign in error:', e);
          Utils.showToast('ログインが完了できませんでした', true);
        }
      },

      async signOutFromSync() {
        try {
          await window.FirebaseSync?.signOut();
          Utils.showToast('同期を解除しました');
        } catch (e) {
          console.warn('Firebase sign out error:', e);
          Utils.showToast('同期解除に失敗しました', true);
        }
      },

      async retrySync() {
        try {
          await window.FirebaseSync?.retry();
        } catch (e) {
          console.warn('Firebase retry error:', e);
          Utils.showToast('同期を再開できませんでした', true);
        }
      },
      
      openCalendarLink(title, dateStr) {
        const url = Utils.getCalendarUrl(title, dateStr);
        window.open(url, '_blank');
      }
    };

    const UIEnhancements = {
      calendarIcons: {
        daily: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M14 14.8V5a3 3 0 0 0-6 0v9.8a5 5 0 1 0 6 0Z"/></svg>',
        clinic: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 7h16v13H4V7Zm4 0V4h8v3m-4 3v7m-3.5-3.5h7"/></svg>',
        iui: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 3v3m12-3v3M4 9h16M5 5h14v15H4V5Z"/></svg>',
      },
      refineCalendarDetail(root) {
        if (!root || this.refining) return;
        const actionButtons = [...root.querySelectorAll('button[onclick*="App.openModal"]')];
        const hasLegacyEmoji = /[💕📌💓❌🩸✨🥚🌡🏥]/u.test(root.textContent || '');
        const hasLegacyColor = !!root.querySelector('[class*="pink"], [class*="rose"], [class*="blue"]');
        const missingIcons = actionButtons.some(button => !button.querySelector('svg'));
        if (!hasLegacyEmoji && !hasLegacyColor && !missingIcons) return;
        this.refining = true;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          node.nodeValue = node.nodeValue.replace(/[💕📌💓❌🩸✨🥚🌡🏥]/gu, '').replace(/\s{2,}/g, ' ');
        });
        root.querySelectorAll('[class*="pink"], [class*="rose"], [class*="blue"]').forEach(element => {
          [...element.classList].filter(name => /pink|rose|blue/.test(name)).forEach(name => element.classList.remove(name));
          element.classList.add('text-primary');
        });
        actionButtons.forEach(button => {
          if (button.querySelector('svg')) return;
          const action = button.getAttribute('onclick') || '';
          const type = action.includes("'daily'") ? 'daily' : action.includes("'clinic'") ? 'clinic' : 'iui';
          button.insertAdjacentHTML('afterbegin', this.calendarIcons[type]);
        });
        this.refining = false;
      },
      init() {
        const content = document.getElementById('app-content');
        const observer = new MutationObserver(() => {
          const detail = document.getElementById('cal-detail-area');
          if (detail && detail.querySelector('.card-soft')) {
            this.refineCalendarDetail(detail);
          }
        });
        observer.observe(content, { childList: true, subtree: true });
      },
    };

    window.onload = () => {
      UIEnhancements.init();
      App.init();
    };
  </script>
