    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (!spanRef.current) return;
                spanRef.current.innerHTML = '';
                const pascalName = name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join('');
                const camelName = name.split('-').map((word, index) => index === 0 ? word : word.charAt(0).toUpperCase() + word.slice(1)).join('');
                const iconData = lucide.icons[pascalName] || lucide.icons[camelName] || lucide.icons[name];
                
                if (iconData) {
                    const svg = lucide.createElement(iconData);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    if (className) svg.setAttribute('class', className);
                    spanRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSize = 800;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                        else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                        
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.onerror = () => reject(new Error("画像の読込失敗"));
                    img.src = event.target.result;
                };
                reader.onerror = () => reject(new Error("ファイルの読込失敗"));
                reader.readAsDataURL(file);
            });
        };

        async function callGeminiAPI(apiKey, payload) {
            const modelsToTry = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-1.5-pro'];
            let lastError = null;
            
            for (const model of modelsToTry) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey.trim()}`;
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (response.ok) return await response.json();
                    
                    const errJson = await response.json().catch(() => ({}));
                    const errorMessage = errJson.error?.message || `HTTP ${response.status}`;
                    
                    if (response.status === 429 || errorMessage.toLowerCase().includes('quota') || errorMessage.toLowerCase().includes('exceeded')) {
                        throw new Error("本日のAPI利用上限に達しました。16時頃にリセットされます。お急ぎの場合は別のアカウントで新しいAPIキーを設定してください。");
                    }

                    if (response.status === 404 || errorMessage.includes('not found')) {
                        lastError = new Error(`モデルが見つかりません。Google Cloudではなく、Google AI Studioで取得したAPIキーか確認してください。(${model})`);
                        continue;
                    }
                    throw new Error(`[${model}] ${errorMessage}`);
                } catch (e) {
                    lastError = e;
                    if (e.message.includes('上限に達しました')) throw e;
                }
            }
            throw lastError || new Error("利用可能なAIモデルが見つかりませんでした。");
        }

        async function generateIdealParty(apiKey, berries, mealType) {
          const berryList = berries.join('、');
          const prompt = `あなたはポケモンスリープの熟練プレイヤーです。以下の条件に合わせた「理想のパーティ（5匹）」を考案してください。
            【今週の条件】カビゴンの好みのきのみ: ${berryList} / 料理カテゴリ: ${mealType}
            【考慮事項】手持ち状況は無視し、全ポケモンから最適な5匹を選択。きのみ得意と食材得意のバランス、ヒーラー等のスキル要員も考慮。
            以下のJSON形式で出力してください。`;

          const payload = {
            contents: [{ role: "user", parts: [{ text: prompt }] }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  concept: { type: "STRING" },
                  party: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, role: { type: "STRING" }, reason: { type: "STRING" } }, required: ["name", "role", "reason"] } },
                  targetMeals: { type: "ARRAY", items: { type: "STRING" } }
                },
                required: ["concept", "party", "targetMeals"]
              }
            }
          };

          const result = await callGeminiAPI(apiKey, payload);
          const cleanText = result.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
          return JSON.parse(cleanText);
        }

        async function evaluatePokemons(apiKey, imagesData) {
          const prompt = `複数のポケモンスリープのステータス画面画像です。【提供された画像の順番通りに】各ポケモンを鑑定しリスト化してください。
            1. 種族名、性格、サブスキル(最大5)、食材を読取。 2. 「きのみ」「食材」「スキル」の中から得意なことを1つ判断。 3. 役割に対する性格・サブスキルの噛み合いを厳しく評価。 4. 総合評価をS,A,B,Cで判定。`;

          const parts = [{ text: prompt }];
          imagesData.forEach(base64Data => {
            const mimeType = base64Data.match(/^data:(image\/[a-zA-Z+]+);base64,/)?.[1] || 'image/jpeg';
            const base64String = base64Data.replace(/^data:image\/[a-zA-Z+]+;base64,/, '');
            parts.push({ inlineData: { mimeType: mimeType, data: base64String } });
          });

          const payload = {
            contents: [{ role: "user", parts: parts }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT", 
                properties: {
                  results: {
                    type: "ARRAY", 
                    items: { 
                      type: "OBJECT", 
                      properties: {
                        name: { type: "STRING" }, 
                        specialty: { type: "STRING", description: "「きのみ」「食材」「スキル」のいずれか" }, 
                        nature: { type: "STRING" },
                        subSkills: { type: "ARRAY", items: { type: "STRING" } },
                        ingredients: { type: "ARRAY", items: { type: "STRING" } },
                        rank: { type: "STRING" }, 
                        score: { type: "INTEGER" },
                        goodPoints: { type: "ARRAY", items: { type: "STRING" } }, 
                        badPoints: { type: "ARRAY", items: { type: "STRING" } }, 
                        conclusion: { type: "STRING" }
                      },
                      required: ["name", "specialty", "nature", "subSkills", "ingredients", "rank", "score", "goodPoints", "badPoints", "conclusion"]
                    }
                  }
                },
                required: ["results"]
              }
            }
          };

          const result = await callGeminiAPI(apiKey, payload);
          const cleanText = result.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(cleanText);
          return parsed.results || parsed;
        }

        async function reEvaluatePokemon(apiKey, data) {
          const prompt = `以下のポケモンのステータス情報に基づいて、個体値（厳選度合）を再評価してください。
            
【対象ポケモン情報】
- 種族名: ${data.name}
- 得意なこと: ${data.specialty} (※重要: AIの事前知識と異なっていても、必ずこの役割を前提として評価すること)
- 性格: ${data.nature || '不明'}
- 食材: ${data.ingredients || '不明'}
- サブスキル: ${data.subSkills || '不明'}

【評価のポイント】
1. 指定された「得意なこと」の役割に対して、現在の「性格」と「サブスキル」の噛み合い具合を厳しく評価してください。
2. 総合的な評価をS, A, B, Cで判定し、アドバイスをしてください。
以下のJSON形式で出力してください。`;

          const payload = {
            contents: [{ role: "user", parts: [{ text: prompt }] }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  rank: { type: "STRING" }, score: { type: "INTEGER" },
                  goodPoints: { type: "ARRAY", items: { type: "STRING" } }, badPoints: { type: "ARRAY", items: { type: "STRING" } }, conclusion: { type: "STRING" }
                },
                required: ["rank", "score", "goodPoints", "badPoints", "conclusion"]
              }
            }
          };

          const result = await callGeminiAPI(apiKey, payload);
          const cleanText = result.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
          return JSON.parse(cleanText);
        }

        function App() {
          const [activeTab, setActiveTab] = useState('evaluate'); 
          const [toastMsg, setToastMsg] = useState({ text: '', type: 'error' });
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
          const [isKeySaved, setIsKeySaved] = useState(() => !!localStorage.getItem('gemini_api_key'));
          
          const [selectedField, setSelectedField] = useState('ワカクサ本島 (手動選択)');
          const [selectedBerries, setSelectedBerries] = useState([]);
          const [mealType, setMealType] = useState('カレー・シチュー');
          const [isGeneratingParty, setIsGeneratingParty] = useState(false);
          const [partyResult, setPartyResult] = useState(null);

          const [selectedImages, setSelectedImages] = useState([]);
          const [isEvaluating, setIsEvaluating] = useState(false);
          const [evaluationResults, setEvaluationResults] = useState(null);
          const [expandedResults, setExpandedResults] = useState(new Set()); 
          const [threshold, setThreshold] = useState('A'); 
          const fileInputRef = useRef(null);

          // 編集・再鑑定用ステート
          const [editingIdx, setEditingIdx] = useState(null);
          const [editFormData, setEditFormData] = useState(null);
          // 複数の一括再鑑定に対応するため、処理中のインデックスをSetで管理
          const [reEvaluatingIndices, setReEvaluatingIndices] = useState(new Set());

          const RANK_VALUES = { 'S': 4, 'A': 3, 'B': 2, 'C': 1 };

          const ALL_BERRIES = [
            { name: 'キー', color: 'bg-pink-300' }, { name: 'ヒメリ', color: 'bg-red-500' },
            { name: 'オレン', color: 'bg-blue-400' }, { name: 'ウブ', color: 'bg-yellow-300' },
            { name: 'ドリ', color: 'bg-green-500' }, { name: 'チーゴ', color: 'bg-cyan-400' },
            { name: 'クラボ', color: 'bg-red-600' }, { name: 'カゴ', color: 'bg-purple-500' },
            { name: 'フィラ', color: 'bg-yellow-500' }, { name: 'シーヤ', color: 'bg-amber-700' },
            { name: 'マゴ', color: 'bg-pink-400' }, { name: 'ラム', color: 'bg-lime-400' },
            { name: 'オボン', color: 'bg-yellow-400' }, { name: 'ブリー', color: 'bg-purple-600' },
            { name: 'ヤチェ', color: 'bg-sky-500' }, { name: 'ウイ', color: 'bg-indigo-700' },
            { name: 'ベリブ', color: 'bg-blue-600' }, { name: 'モモン', color: 'bg-pink-200' }
          ];

          const FIELDS = [
            { name: 'ワカクサ本島 (手動選択)', berries: [] },
            { name: 'シアンの砂浜', berries: ['オレン', 'モモン', 'シーヤ'] },
            { name: 'トープ洞窟', berries: ['ヒメリ', 'オボン', 'フィラ'] },
            { name: 'ウノハナ雪原', berries: ['チーゴ', 'ウイ', 'キー'] },
            { name: 'ラピスラズリ湖畔', berries: ['ドリ', 'マゴ', 'クラボ'] },
            { name: 'ゴールド旧発電所', berries: ['ウブ', 'ベリブ', 'ブリー'] }
          ];

          const showToast = (text, type = 'error') => {
              setToastMsg({ text, type });
              setTimeout(() => setToastMsg({ text: '', type: 'error' }), 6000); 
          };

          const handleSaveKey = () => {
            if (!apiKey.trim()) { showToast("APIキーを入力してください"); return; }
            localStorage.setItem('gemini_api_key', apiKey.trim());
            setIsKeySaved(true);
            showToast("APIキーを保存しました！", "success");
          };

          const handleClearKey = () => {
            localStorage.removeItem('gemini_api_key');
            setApiKey(''); setIsKeySaved(false);
          };

          const handleFieldChange = (e) => {
            const fieldName = e.target.value;
            setSelectedField(fieldName);
            const field = FIELDS.find(f => f.name === fieldName);
            if (field && field.berries.length > 0) setSelectedBerries(field.berries);
            else setSelectedBerries([]);
          };

          const toggleBerry = (berryName) => {
            setSelectedField('ワカクサ本島 (手動選択)');
            if (selectedBerries.includes(berryName)) setSelectedBerries(selectedBerries.filter(b => b !== berryName));
            else if (selectedBerries.length < 3) setSelectedBerries([...selectedBerries, berryName]);
          };

          const handleGenerateParty = async () => {
            if (!isKeySaved) { showToast("設定からAPIキーを登録してください"); setActiveTab('settings'); return; }
            if (selectedBerries.length === 0) return;
            setIsGeneratingParty(true);
            try {
              const res = await generateIdealParty(apiKey, selectedBerries, mealType);
              setPartyResult(res);
              showToast("編成が完了しました！", "success");
            } catch (e) { showToast(e.message); } 
            finally { setIsGeneratingParty(false); }
          };

          const handleImageChange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            try {
                const compressedImages = await Promise.all(files.map(file => compressImage(file)));
                setSelectedImages(prev => [...prev, ...compressedImages]);
                setEvaluationResults(null); setExpandedResults(new Set()); 
            } catch(e) { showToast("画像の読込に失敗しました"); }
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          const handleRemoveImage = (indexToRemove) => {
            setSelectedImages(prev => prev.filter((_, idx) => idx !== indexToRemove));
            setEvaluationResults(null); setExpandedResults(new Set());
          };

          const handleEvaluate = async () => {
            if (!isKeySaved) { showToast("設定からAPIキーを登録してください"); setActiveTab('settings'); return; }
            if (selectedImages.length === 0) return;
            setIsEvaluating(true); setExpandedResults(new Set()); 
            try {
              const res = await evaluatePokemons(apiKey, selectedImages);
              setEvaluationResults(res);
              showToast("鑑定が完了しました！", "success");
            } catch (e) { showToast(e.message); } 
            finally { setIsEvaluating(false); }
          };

          const handleClearAll = () => {
            setSelectedImages([]); setEvaluationResults(null); setExpandedResults(new Set());
            setEditingIdx(null); setEditFormData(null);
          };

          const toggleResult = (idx) => {
            if (editingIdx === idx || reEvaluatingIndices.has(idx)) return; // 編集中・再鑑定中は閉じない
            setExpandedResults(prev => {
              const newSet = new Set(prev);
              if (newSet.has(idx)) newSet.delete(idx); else newSet.add(idx);
              return newSet;
            });
          };

          const startEditing = (idx, res, e) => {
            e.stopPropagation();
            setEditingIdx(idx);
            
            // ドロップダウンの選択肢に確実に一致させるための処理
            let initSpec = 'きのみ';
            if (res.specialty && res.specialty.includes('食材')) initSpec = '食材';
            else if (res.specialty && res.specialty.includes('スキル')) initSpec = 'スキル';

            setEditFormData({
                name: res.name || '',
                specialty: initSpec,
                nature: res.nature || '',
                ingredients: res.ingredients ? res.ingredients.join(', ') : '',
                subSkills: res.subSkills ? res.subSkills.join(', ') : ''
            });
          };

          // 手動修正したデータで再鑑定する (applyToAll が true なら同名のポケモンも一括修正)
          const handleReEvaluate = async (idx, applyToAll = false) => {
            if (!isKeySaved) return;
            
            const targetName = editFormData.name;
            const targetSpecialty = editFormData.specialty;
            
            // 適用対象のインデックスを特定
            let targetIndices = [idx];
            if (applyToAll) {
                targetIndices = evaluationResults
                    .map((res, i) => (res.name === targetName ? i : -1))
                    .filter(i => i !== -1);
            }

            setReEvaluatingIndices(new Set(targetIndices));
            try {
              const newResults = [...evaluationResults];
              
              // 順番にAPIを叩いて更新
              for (const targetIdx of targetIndices) {
                  let dataToEval;
                  if (targetIdx === idx) {
                      // 編集を開いている個体は、フォームの全データを適用
                      dataToEval = { ...editFormData };
                  } else {
                      // 他の同種族個体は「名前」と「得意なこと」だけ上書きして、性格・サブスキル等は元のものを維持
                      const originalRes = evaluationResults[targetIdx];
                      dataToEval = {
                          name: targetName,
                          specialty: targetSpecialty,
                          nature: originalRes.nature || '',
                          ingredients: originalRes.ingredients ? originalRes.ingredients.join(', ') : '',
                          subSkills: originalRes.subSkills ? originalRes.subSkills.join(', ') : ''
                      };
                  }

                  const res = await reEvaluatePokemon(apiKey, dataToEval);
                  
                  newResults[targetIdx] = { 
                      ...newResults[targetIdx], 
                      name: dataToEval.name,
                      specialty: dataToEval.specialty,
                      nature: dataToEval.nature,
                      ingredients: dataToEval.ingredients.split(',').map(s=>s.trim()).filter(s=>s),
                      subSkills: dataToEval.subSkills.split(',').map(s=>s.trim()).filter(s=>s),
                      rank: res.rank,
                      score: res.score,
                      goodPoints: res.goodPoints,
                      badPoints: res.badPoints,
                      conclusion: res.conclusion
                  };
              }
              
              setEvaluationResults(newResults);
              setEditingIdx(null);
              showToast(applyToAll ? `${targetIndices.length}匹を一括で再鑑定しました！` : "修正内容で再鑑定しました！", "success");
            } catch (e) {
              showToast(e.message);
            } finally {
              setReEvaluatingIndices(new Set());
            }
          };

          return (
            <div className="h-screen w-full flex flex-col bg-slate-100 text-slate-800 font-sans sm:max-w-md sm:mx-auto sm:border-x sm:shadow-xl relative overflow-hidden">
              
              {toastMsg.text && (
                  <div className={`fixed top-16 left-1/2 -translate-x-1/2 w-11/12 max-w-sm px-4 py-3 rounded-xl shadow-2xl z-50 flex items-center justify-between transition-all ${toastMsg.type === 'error' ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'}`}>
                      <span className="text-sm font-bold pr-2 break-all line-clamp-3">{toastMsg.text}</span>
                      <button onClick={() => setToastMsg({text: '', type: 'error'})} className={`p-1.5 rounded-full flex-shrink-0 ${toastMsg.type === 'error' ? 'hover:bg-red-700 bg-red-500' : 'hover:bg-emerald-700 bg-emerald-500'}`}><Icon name="x" size={16} /></button>
                  </div>
              )}

              <header className="bg-orange-500 text-white p-4 shadow-md z-10 safe-top flex justify-between items-center">
                <h1 className="text-xl font-bold tracking-wider flex items-center gap-2">
                  <Icon name="sparkles" size={20} /> ポケさぽ
                </h1>
                <button onClick={() => setActiveTab('settings')} className="p-1 hover:bg-orange-600 rounded-full transition-colors">
                  <Icon name="settings" size={20} />
                </button>
              </header>

              <main className="flex-1 overflow-y-auto pb-24 p-4 safe-bottom">
                
                {/* === タブ0: 設定 === */}
                {activeTab === 'settings' && (
                  <div className="space-y-6 animate-in fade-in duration-300">
                     <div className="text-center space-y-2 mb-6">
                      <h2 className="text-2xl font-bold text-slate-700">設定</h2>
                      <p className="text-sm text-slate-500">AI機能を利用するための準備</p>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <div>
                            <label className="font-bold text-slate-700 block mb-2 flex items-center gap-2">
                                <Icon name="key" size={18} className="text-orange-500" />Gemini API キー
                            </label>
                            <p className="text-xs text-slate-500 mb-4 leading-relaxed">
                                <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-blue-500 underline font-bold">Google AI Studio</a> から無料で取得したAPIキーを入力してください。<br/>
                                ※Google Cloud側のキーでは利用できません。
                            </p>
                            <input 
                                type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)}
                                placeholder="AIzaSy..." 
                                className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-orange-400 outline-none font-mono text-sm mb-4"
                                disabled={isKeySaved}
                            />
                            {isKeySaved ? (
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2 text-emerald-600 bg-emerald-50 p-3 rounded-lg text-sm font-bold border border-emerald-200">
                                        <Icon name="check-circle-2" size={18} /> キーは保存されています
                                    </div>
                                    <button onClick={handleClearKey} className="w-full py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl font-bold transition-colors">
                                        キーを削除して再設定する
                                    </button>
                                </div>
                            ) : (
                                <button onClick={handleSaveKey} className="w-full py-3 bg-orange-500 hover:bg-orange-600 text-white rounded-xl font-bold shadow-md transition-colors flex justify-center items-center gap-2">
                                    <Icon name="save" size={18} /> 端末に保存する
                                </button>
                            )}
                        </div>
                    </div>
                    <div className="text-center pb-8 text-[10px] text-slate-400 font-bold">ポケさぽ v1.4</div>
                  </div>
                )}

                {/* === タブ1: 理想パーティ === */}
                {activeTab === 'party' && (
                  <div className="space-y-6 animate-in fade-in duration-300">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                      <h2 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="chef-hat" className="text-orange-500" /> 今週の条件</h2>
                      <div className="space-y-4">
                        <div>
                          <label className="text-xs font-bold text-slate-500 mb-2 block">料理カテゴリ</label>
                          <select value={mealType} onChange={(e) => setMealType(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700">
                            <option value="カレー・シチュー">カレー・シチュー</option><option value="サラダ">サラダ</option><option value="デザート・ドリンク">デザート・ドリンク</option>
                          </select>
                        </div>
                        <div className="pt-2 border-t border-slate-100">
                          <label className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1.5"><Icon name="map" size={14} /> フィールドから自動設定</label>
                          <select value={selectedField} onChange={handleFieldChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-emerald-700">
                            {FIELDS.map(f => <option key={f.name} value={f.name}>{f.name}</option>)}
                          </select>
                        </div>
                        
                        <div>
                          <div className="flex justify-between items-end mb-2 mt-2"><label className="text-xs font-bold text-slate-500 block">好みのきのみ（最大3つ）</label></div>
                          <div className="grid grid-cols-4 gap-2">
                            {ALL_BERRIES.map(berry => (
                              <button key={berry.name} onClick={() => toggleBerry(berry.name)}
                                className={`flex flex-col items-center justify-center py-2 px-1 rounded-xl transition-all border-2 ${selectedBerries.includes(berry.name) ? 'bg-orange-50 border-orange-500 shadow-sm transform scale-95' : 'bg-white border-slate-100 hover:bg-slate-50'}`}>
                                <div className={`w-8 h-8 rounded-full mb-1 ${berry.color} border-2 border-white shadow-inner flex-shrink-0`}></div>
                                <span className={`text-[10px] font-bold ${selectedBerries.includes(berry.name) ? 'text-orange-700' : 'text-slate-600'}`}>{berry.name}</span>
                              </button>
                            ))}
                          </div>
                        </div>

                        {!isKeySaved && <div className="text-xs text-red-500 bg-red-50 p-2 rounded border border-red-200 mt-2">※利用には設定タブでAPIキーが必要です</div>}
                        <button onClick={handleGenerateParty} disabled={isGeneratingParty || selectedBerries.length === 0}
                          className="w-full mt-6 py-4 bg-orange-500 text-white rounded-xl font-bold text-lg flex justify-center items-center gap-2 disabled:opacity-50">
                          {isGeneratingParty ? <><Icon name="loader-2" className="animate-spin" size={20} /> AIが思考中...</> : "理想のパーティを生成"}
                        </button>
                      </div>
                    </div>

                    {partyResult && (
                      <div className="space-y-4 animate-in slide-in-from-bottom-4">
                        <div className="bg-gradient-to-br from-orange-50 to-amber-50 p-5 rounded-2xl border border-orange-200 shadow-sm">
                          <h3 className="font-bold text-orange-800 mb-2 text-lg">💡 編成コンセプト</h3>
                          <p className="text-sm text-orange-900 leading-relaxed">{partyResult.concept}</p>
                        </div>
                        <div className="space-y-3">
                          <h3 className="font-bold text-slate-700 ml-1">おすすめの5匹</h3>
                          {partyResult.party.map((poke, idx) => (
                            <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex gap-4 items-start">
                              <div className="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold flex-shrink-0">{idx + 1}</div>
                              <div>
                                <div className="flex items-center gap-2 mb-1"><span className="font-bold text-slate-800 text-lg">{poke.name}</span><span className="text-[10px] px-2 py-0.5 bg-slate-100 text-slate-600 rounded-full font-bold">{poke.role}</span></div>
                                <p className="text-xs text-slate-500 leading-relaxed">{poke.reason}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    <div className="text-center pb-8 text-[10px] text-slate-400 font-bold">ポケさぽ v1.4</div>
                  </div>
                )}

                {/* === タブ2: 個体評価 === */}
                {activeTab === 'evaluate' && (
                  <div className="space-y-6 animate-in fade-in duration-300">
                     <div className="text-center space-y-2 mb-4">
                      <h2 className="text-2xl font-bold text-slate-700">一括個体チェッカー</h2>
                      <p className="text-sm text-slate-500">スクショを複数選択してまとめて鑑定</p>
                    </div>

                    {!isKeySaved && (
                        <div className="mx-4 text-sm text-red-600 bg-red-50 p-3 rounded-xl border border-red-200 text-center font-bold cursor-pointer" onClick={() => setActiveTab('settings')}>
                            ⚠️ まずは右上の歯車アイコンから<br/>Gemini APIキーを登録してください
                        </div>
                    )}

                    {selectedImages.length > 0 && (
                      <div className="flex gap-3 overflow-x-auto pb-4 px-1 snap-x">
                        {selectedImages.map((img, idx) => (
                          <div key={idx} className="relative w-28 h-48 flex-shrink-0 rounded-xl overflow-hidden border-2 border-orange-200 shadow-sm snap-start bg-slate-200">
                            <img src={img} className="w-full h-full object-cover" />
                            <button onClick={() => handleRemoveImage(idx)} disabled={isEvaluating || reEvaluatingIndices.size > 0} className="absolute top-1.5 right-1.5 p-1 bg-black/60 text-white rounded-full disabled:opacity-50"><Icon name="x" size={14} /></button>
                            <div className="absolute bottom-0 left-0 w-full bg-black/50 text-white text-[10px] text-center py-1 font-bold">
                                {reEvaluatingIndices.has(idx) ? <Icon name="loader-2" size={12} className="animate-spin" /> : `${idx + 1}匹目`}
                            </div>
                          </div>
                        ))}
                        {!isEvaluating && !evaluationResults && (
                          <button onClick={() => fileInputRef.current?.click()} className="w-28 h-48 flex-shrink-0 rounded-xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center gap-2 text-slate-400 snap-start">
                            <Icon name="plus" size={24} /><span className="text-xs font-bold">追加</span>
                          </button>
                        )}
                      </div>
                    )}

                    {selectedImages.length === 0 && (
                      <div onClick={() => !isEvaluating && fileInputRef.current?.click()} className="border-2 border-dashed border-slate-300 bg-white hover:bg-slate-50 rounded-2xl p-8 flex flex-col items-center justify-center gap-3 cursor-pointer">
                        <div className="w-16 h-16 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mb-2"><Icon name="camera" size={32} /></div>
                        <span className="font-bold text-slate-600">画像をタップして選択</span>
                        <span className="text-xs text-slate-400">複数枚まとめて選択できます</span>
                      </div>
                    )}

                    <input type="file" multiple ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageChange} />

                    {selectedImages.length > 0 && !evaluationResults && (
                      <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <div className="flex items-center justify-between border-b border-slate-100 pb-3">
                          <div className="text-sm font-bold text-slate-600 flex items-center gap-2"><Icon name="archive-restore" size={16} /> 仕分けライン設定</div>
                          <select value={threshold} onChange={(e) => setThreshold(e.target.value)} className="p-1.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-sm font-bold text-orange-600">
                            <option value="S">Sランク以上のみ</option><option value="A">Aランク以上</option><option value="B">Bランク以上</option>
                          </select>
                        </div>
                        <div className="flex gap-3">
                          <button onClick={handleClearAll} disabled={isEvaluating} className="w-1/3 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold disabled:opacity-70">クリア</button>
                          <button onClick={handleEvaluate} disabled={isEvaluating} className="w-2/3 py-3 bg-orange-500 text-white rounded-xl font-bold shadow-md flex justify-center items-center gap-2 disabled:opacity-70">
                            {isEvaluating ? <><Icon name="loader-2" className="animate-spin" size={18} /> 鑑定中...</> : `${selectedImages.length}匹を鑑定`}
                          </button>
                        </div>
                      </div>
                    )}

                    {evaluationResults && (
                      <div className="space-y-6 animate-in slide-in-from-bottom-4">
                        <div className="flex items-center justify-between border-b-2 border-slate-200 pb-2">
                          <div>
                            <h3 className="font-bold text-slate-700 text-lg">鑑定結果 ({evaluationResults.length}匹)</h3>
                          </div>
                          <button onClick={handleClearAll} disabled={reEvaluatingIndices.size > 0} className="text-sm font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-full disabled:opacity-50">新しく鑑定</button>
                        </div>

                        <div className="space-y-3">
                          {evaluationResults.map((res, idx) => {
                            const isExpanded = expandedResults.has(idx);
                            const isKeep = (RANK_VALUES[res.rank] || 0) >= RANK_VALUES[threshold];
                            const isEditingThis = editingIdx === idx;
                            const isReEvaluatingThis = reEvaluatingIndices.has(idx);

                            // 同じ名前のポケモンが他にいるかカウント
                            const samePokemonCount = evaluationResults.filter(r => r.name === editFormData?.name).length;

                            return (
                              <div key={idx} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden ${isKeep ? 'border-emerald-200' : 'border-slate-200 opacity-90'}`}>
                                <div onClick={() => toggleResult(idx)} className={`flex items-center gap-3 p-3 cursor-pointer ${isKeep ? 'bg-emerald-50/30' : 'bg-slate-50'}`}>
                                  <div className="relative flex-shrink-0">
                                    <img src={selectedImages[idx]} className="w-14 h-14 rounded-lg object-cover border border-slate-200 shadow-sm" />
                                    <div className="absolute -top-2 -left-2 w-5 h-5 bg-slate-800 text-white rounded-full flex items-center justify-center text-[10px] font-bold border-2 border-white shadow-sm">
                                        {isReEvaluatingThis ? <Icon name="loader-2" size={12} className="animate-spin" /> : idx + 1}
                                    </div>
                                  </div>
                                  <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-0.5">
                                      <h3 className={`font-bold text-lg leading-none ${isKeep ? 'text-slate-800' : 'text-slate-600'}`}>{res.name}</h3>
                                      <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 ${isKeep ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'}`}>
                                        {isKeep ? <Icon name="package-check" size={12}/> : <Icon name="archive-restore" size={12}/>}{isKeep ? 'キープ' : '博士へ'}
                                      </span>
                                    </div>
                                    <div className="text-[10px] font-bold text-slate-400">{res.specialty}</div>
                                  </div>
                                  <div className="text-right flex-shrink-0 flex items-center gap-2">
                                    <div className={`text-2xl font-black leading-none ${isKeep ? 'text-orange-500' : 'text-slate-400'}`}>{res.rank}</div>
                                    <Icon name="chevron-down" className={`text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} size={16} />
                                  </div>
                                </div>

                                {isExpanded && (
                                  isEditingThis ? (
                                    <div className="p-4 space-y-4 border-t border-orange-200 bg-orange-50/30">
                                      <div className="text-xs font-bold text-orange-600 flex items-center gap-1"><Icon name="pencil" size={14} /> 読み取り結果を修正</div>
                                      <div className="space-y-3">
                                        <div className="grid grid-cols-2 gap-3">
                                          <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-500">種族名</label>
                                            <input type="text" value={editFormData.name} onChange={(e) => setEditFormData({...editFormData, name: e.target.value})} className="w-full p-2 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-400" />
                                          </div>
                                          <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-500">得意なこと</label>
                                            <select value={editFormData.specialty} onChange={(e) => setEditFormData({...editFormData, specialty: e.target.value})} className="w-full p-2 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
                                              <option value="きのみ">きのみ</option>
                                              <option value="食材">食材</option>
                                              <option value="スキル">スキル</option>
                                            </select>
                                          </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                          <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-500">性格</label>
                                            <input type="text" value={editFormData.nature} onChange={(e) => setEditFormData({...editFormData, nature: e.target.value})} className="w-full p-2 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-400" />
                                          </div>
                                          <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-500">食材 (カンマ区切り)</label>
                                            <input type="text" value={editFormData.ingredients} onChange={(e) => setEditFormData({...editFormData, ingredients: e.target.value})} className="w-full p-2 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-400" />
                                          </div>
                                        </div>
                                        <div className="space-y-1">
                                          <label className="text-[10px] font-bold text-slate-500">サブスキル (カンマ区切り)</label>
                                          <textarea value={editFormData.subSkills} onChange={(e) => setEditFormData({...editFormData, subSkills: e.target.value})} className="w-full p-2 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-400 h-16 resize-none" />
                                        </div>
                                      </div>
                                      
                                      <div className="flex flex-col gap-2 pt-2">
                                        <div className="flex gap-2">
                                          <button onClick={() => setEditingIdx(null)} disabled={reEvaluatingIndices.size > 0} className="w-1/3 py-2.5 bg-slate-200 text-slate-700 rounded-xl text-sm font-bold disabled:opacity-50">キャンセル</button>
                                          <button onClick={() => handleReEvaluate(idx, false)} disabled={reEvaluatingIndices.size > 0} className="w-2/3 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-sm font-bold flex justify-center items-center gap-2 shadow-sm disabled:opacity-50">
                                            {isReEvaluatingThis ? <><Icon name="loader-2" className="animate-spin" size={16} /> 再鑑定中...</> : <><Icon name="refresh-cw" size={16} /> この1匹を再鑑定</>}
                                          </button>
                                        </div>
                                        {/* 同種族がいれば一括修正ボタンを表示 */}
                                        {samePokemonCount > 1 && (
                                          <button onClick={() => handleReEvaluate(idx, true)} disabled={reEvaluatingIndices.size > 0} className="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl text-sm font-bold flex justify-center items-center gap-2 shadow-sm disabled:opacity-50">
                                             <Icon name="copy-check" size={16} /> 同じポケモン({samePokemonCount}匹)を一括再鑑定
                                          </button>
                                        )}
                                      </div>
                                    </div>
                                  ) : (
                                    <div className="p-4 space-y-4 border-t border-slate-100 bg-white">
                                      <div className="flex justify-between items-center bg-slate-50 p-2.5 rounded-xl border border-slate-100 mb-2">
                                        <div className="text-[10px] text-slate-500 flex flex-wrap gap-x-3 gap-y-1">
                                          <div>性格: <span className="font-bold text-slate-700">{res.nature || '-'}</span></div>
                                          <div>サブスキル: <span className="font-bold text-slate-700">{res.subSkills?.length ? res.subSkills[0] + ' 等' : '-'}</span></div>
                                        </div>
                                        <button onClick={(e) => startEditing(idx, res, e)} className="text-[10px] font-bold text-orange-600 bg-white border border-orange-200 px-3 py-1.5 rounded-full flex items-center gap-1 hover:bg-orange-50 transition-colors flex-shrink-0 shadow-sm">
                                          <Icon name="pencil" size={12} /> 誤判定を修正
                                        </button>
                                      </div>

                                      <div className="bg-slate-800 text-white p-3 rounded-lg text-sm font-medium leading-relaxed flex gap-2">
                                         <Icon name="star" size={18} className="text-amber-400 flex-shrink-0 mt-0.5"/><p>{res.conclusion}</p>
                                      </div>
                                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <div className="bg-emerald-50 border border-emerald-100 p-3 rounded-xl">
                                          <h4 className="font-bold text-emerald-800 flex items-center gap-1.5 mb-2 text-xs"><Icon name="check-circle-2" size={14} /> 評価ポイント</h4>
                                          <ul className="space-y-1.5">{res.goodPoints.map((pt, i) => <li key={i} className="text-xs text-emerald-700 flex gap-1.5"><Icon name="arrow-right" size={12} className="mt-0.5 shrink-0 opacity-70" /> {pt}</li>)}</ul>
                                        </div>
                                        {res.badPoints && res.badPoints.length > 0 && (
                                          <div className="bg-red-50 border border-red-100 p-3 rounded-xl">
                                            <h4 className="font-bold text-red-800 flex items-center gap-1.5 mb-2 text-xs"><Icon name="alert-triangle" size={14} /> 妥協点・残念な点</h4>
                                            <ul className="space-y-1.5">{res.badPoints.map((pt, i) => <li key={i} className="text-xs text-red-700 flex gap-1.5"><Icon name="arrow-right" size={12} className="mt-0.5 shrink-0 opacity-70" /> {pt}</li>)}</ul>
                                          </div>
                                        )}
                                      </div>
                                    </div>
                                  )
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    <div className="text-center pb-8 text-[10px] text-slate-400 font-bold">ポケさぽ v1.4</div>
                  </div>
                )}
              </main>

              <nav className="fixed sm:absolute bottom-0 w-full sm:max-w-md bg-white border-t border-slate-200 flex justify-around items-center h-16 pb-safe z-20">
                <button onClick={() => setActiveTab('party')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'party' ? 'text-orange-500' : 'text-slate-400'}`}>
                  <Icon name="users" size={24} /><span className="text-[10px] font-bold">理想編成</span>
                </button>
                <button onClick={() => setActiveTab('evaluate')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'evaluate' ? 'text-orange-500' : 'text-slate-400'}`}>
                  <Icon name="camera" size={24} /><span className="text-[10px] font-bold">一括鑑定</span>
                </button>
              </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
